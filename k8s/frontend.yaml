apiVersion: apps/v1
kind: Deployment
metadata:
  name: protocol-frontend
  labels:
    app: protocol-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: protocol-frontend
  template:
    metadata:
      labels:
        app: protocol-frontend
    spec:
      containers:
      - name: protocol-frontend
        image: hobsonbreno/protocolo-web3:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: protocol-frontend-service
spec:
  selector:
    app: protocol-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
