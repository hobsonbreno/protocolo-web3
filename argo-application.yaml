apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: protocol-web3-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hobsonbreno/protocolo-web3.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
